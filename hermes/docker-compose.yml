#
# Hermes Agent — Docker Compose (eval harness)
#
# All Hermes state (config, skills, memory, sessions, cron, hooks, plugins)
# lives in ./hermes-home/ so the clean baseline is version-tracked. Runtime
# bloat (caches, *.db, sessions, bundled skills) is gitignored — the container
# regenerates it on first start.
#
# Model: configured in hermes-home/config.yaml. The eval baseline points at
# AWS Bedrock Claude Sonnet 4.6. Repoint it at any backend to keep both
# harnesses on the same model (see ../README.md).
#
# AWS auth: we inject STATIC creds (env) so boto3 never writes the SSO token
# cache. This fixes the "Read-only file system: /opt/data/.aws/sso/cache"
# error that recurs ~hourly when the mounted ~/.aws is read-only and the SSO
# token expires. Refresh the temp creds in .env via `aws sso login` + export.
#
# First-time setup:
#   cp .env.example .env          # then fill AWS creds
#   printf "HERMES_UID=$(id -u)\nHERMES_GID=$(id -g)\n" >> .env
#
# Usage:
#   docker compose run --rm cli chat -q "hi"            # one-shot
#   docker compose run --rm cli                         # interactive
#   docker compose up -d gateway                        # warm process for the runner
#   ../runners/run-hermes.sh LABEL "prompt"             # eval runner (+ metrics)

x-common-env: &common-env
  HERMES_UID: ${HERMES_UID:-10000}
  HERMES_GID: ${HERMES_GID:-10000}
  AWS_REGION: ${AWS_REGION_NAME:-eu-central-1}
  AWS_DEFAULT_REGION: ${AWS_REGION_NAME:-eu-central-1}
  # Static creds take precedence over the SSO profile -> no SSO cache writes.
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}

x-common-volumes: &common-volumes
  - ./hermes-home:/opt/data         # tracked hermes state (config, skills, memory, ...)
  - ./workspace:/workspace          # empty project workspace (clean baseline)

services:

  # cli — interactive chat or one-shot queries (`docker compose run --rm cli ...`)
  cli:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-eval-cli
    restart: "no"
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes: *common-volumes
    environment:
      <<: *common-env
    command: []

  # gateway — long-running agent; the eval runner uses it for fast `docker exec`
  # calls and `hermes sessions export` (token/latency metrics).
  gateway:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-eval-gateway
    restart: unless-stopped
    volumes: *common-volumes
    environment:
      <<: *common-env
    command: ["gateway", "run"]

  # --- ISOLATED Hindsight stack (Hermes memory-provider A/B) -----------------
  # OFF by default; start with `docker compose --profile hindsight up -d`.
  # Self-contained: its own LiteLLM (Bedrock Sonnet, model parity) + Hindsight.
  # Hermes reaches Hindsight in-network at http://hindsight:8888; the eval driver
  # reaches it from the host at http://localhost:8889 (reset / inspection).

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: hermes-eval-litellm
    profiles: ["hindsight"]
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION_NAME: ${AWS_REGION_NAME:-eu-central-1}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-eval-local}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: hermes-eval-hindsight
    profiles: ["hindsight"]
    environment:
      HINDSIGHT_API_LLM_PROVIDER: openai
      HINDSIGHT_API_LLM_BASE_URL: http://litellm:4000/v1
      HINDSIGHT_API_LLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-eval-local}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_LLM_MODEL:-claude-sonnet-4-6}
      HINDSIGHT_API_EMBEDDINGS_PROVIDER: local
      HINDSIGHT_API_WORKER_ID: hermes-hindsight
    volumes:
      - hindsight-pgdata:/home/hindsight/.pg0
    ports:
      - "127.0.0.1:8889:8888"   # host access for the eval driver (reset/inspect)
      - "127.0.0.1:9989:9999"   # control-plane UI
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy

volumes:
  hindsight-pgdata:
